<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Robust Road Sign Detection</title>
    <style>
      :root {
        --bg: #0b1020;
        --text: rgba(255,255,255,0.92);
        --muted: rgba(255,255,255,0.65);
        --border: rgba(255,255,255,0.10);
        --red: #ff4d4f;
        --orange: #ffa940;
        --green: #2ecc71;
        --blue: #4da3ff;
        --purple: #b37feb;
        --slate: rgba(255,255,255,0.85);
      }
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        margin: 0;
        min-height: 100vh;
      }
      .logo {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: 32px;
        margin-bottom: 12px;
      }
      .logo img {
        height: 80px;
        width: auto;
      }
      .container {
        max-width: 500px;
        margin: 20px auto 60px auto;
        background: rgba(255,255,255,0.04);
        box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        border-radius: 16px;
        padding: 32px 28px 24px 28px;
        border: 1px solid var(--border);
        backdrop-filter: blur(10px);
        text-align: center;
      }
      h2 {
        color: var(--slate);
        margin-bottom: 24px;
        font-size: 2rem;
        font-weight: 600;
      }
      .button-group {
        display: flex;
        flex-direction: column;
        gap: 18px;
      }
      button, a.button {
        background: var(--blue);
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 16px 12px;
        font-size: 1.1rem;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s;
        box-shadow: 0 2px 8px rgba(0,0,0,0.07);
        text-decoration: none;
        display: block;
      }
      button:hover, a.button:hover {
        background: var(--orange);
      }
      .button-description {
        color: var(--muted);
        font-size: 0.85rem;
        margin-top: 6px;
      }
    </style>
  </head>
  <body>
    <div class="logo">
      <img src="https://static.wixstatic.com/media/f1a669_7810771f71194aaea024fdd8b6dd0f84~mv2.png/v1/fill/w_368,h_122,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/BusMate-logo.png" alt="Logo" />
    </div>
    <div class="container">
      <h2>Robust Road Sign Detection</h2>
      <p style="color: var(--muted); margin-bottom: 28px;">Select an input method to detect and classify road signs</p>
      <div class="button-group">
        <a href="{{ url_for('upload') }}?input_type=image" class="button">
          📸 Upload Image
          <div class="button-description">Detect signs in a single image</div>
        </a>
        <a href="{{ url_for('upload') }}?input_type=video" class="button">
          🎥 Upload Video
          <div class="button-description">Detect signs in video frames</div>
        </a>
        <a href="{{ url_for('webcam') }}" class="button">
          📷 Use Webcam
          <div class="button-description">Real-time detection from webcam</div>
        </a>
      </div>
    </div>
  </body>
</html>
