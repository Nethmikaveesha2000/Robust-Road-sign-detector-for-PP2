<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Webcam - Robust Road Sign Detection</title>
    <style>
      :root {
        --bg: #0b1020;
        --text: rgba(255,255,255,0.92);
        --muted: rgba(255,255,255,0.65);
        --border: rgba(255,255,255,0.10);
        --red: #ff4d4f;
        --orange: #ffa940;
        --green: #2ecc71;
        --blue: #4da3ff;
        --purple: #b37feb;
        --slate: rgba(255,255,255,0.85);
      }
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        margin: 0;
        min-height: 100vh;
        padding-bottom: 40px;
      }
      .logo {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: 32px;
        margin-bottom: 12px;
      }
      .logo img {
        height: 80px;
        width: auto;
      }
      .container {
        max-width: 1100px;
        margin: 20px auto 60px auto;
        background: rgba(255,255,255,0.04);
        box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        border-radius: 16px;
        padding: 32px 28px 24px 28px;
        border: 1px solid var(--border);
        backdrop-filter: blur(10px);
        text-align: center;
      }
      h2 {
        color: var(--slate);
        margin-bottom: 24px;
        font-size: 2rem;
        font-weight: 600;
      }
      .mode-tabs {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-bottom: 24px;
      }
      .mode-tab {
        padding: 10px 24px;
        border-radius: 8px;
        background: rgba(255,255,255,0.05);
        border: 1px solid var(--border);
        color: var(--muted);
        cursor: pointer;
        transition: all 0.2s;
        font-size: 0.95rem;
      }
      .mode-tab:hover {
        background: rgba(255,255,255,0.1);
        color: var(--text);
      }
      .mode-tab.active {
        background: var(--blue);
        color: #fff;
        border-color: var(--blue);
      }
      .webcam-wrapper {
        display: flex;
        gap: 24px;
        flex-wrap: wrap;
        justify-content: center;
      }
      .video-section {
        flex: 1;
        min-width: 400px;
        max-width: 640px;
      }
      .detection-info-section {
        flex: 0 0 300px;
        text-align: left;
      }
      .webcam-container {
        position: relative;
        margin-bottom: 24px;
      }
      #webcamVideo, #liveVideoFeed {
        width: 100%;
        max-width: 640px;
        border-radius: 12px;
        border: 2px solid var(--border);
        background: #000;
      }
      #captureCanvas {
        display: none;
      }
      .controls {
        display: flex;
        justify-content: center;
        gap: 16px;
        margin-top: 20px;
        flex-wrap: wrap;
      }
      button, a.button {
        background: var(--blue);
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 14px 28px;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s;
        box-shadow: 0 2px 8px rgba(0,0,0,0.07);
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      button:hover, a.button:hover {
        background: var(--orange);
      }
      button:disabled {
        background: var(--muted);
        cursor: not-allowed;
      }
      button.capture-btn {
        background: var(--green);
      }
      button.capture-btn:hover {
        background: #27ae60;
      }
      a.button.secondary {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text);
      }
      a.button.secondary:hover {
        background: rgba(255,255,255,0.1);
      }
      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 0.9rem;
        margin-bottom: 20px;
      }
      .status-badge.ready {
        background: rgba(46, 204, 113, 0.15);
        border: 1px solid rgba(46, 204, 113, 0.3);
        color: var(--green);
      }
      .status-badge.loading {
        background: rgba(77, 163, 255, 0.15);
        border: 1px solid rgba(77, 163, 255, 0.3);
        color: var(--blue);
      }
      .status-badge.error {
        background: rgba(255, 77, 79, 0.15);
        border: 1px solid rgba(255, 77, 79, 0.3);
        color: var(--red);
      }
      .status-badge.detecting {
        background: rgba(46, 204, 113, 0.15);
        border: 1px solid rgba(46, 204, 113, 0.3);
        color: var(--green);
      }
      .detection-panel {
        background: rgba(0,0,0,0.3);
        border-radius: 12px;
        padding: 20px;
        border: 1px solid var(--border);
      }
      .detection-panel h3 {
        color: var(--slate);
        margin: 0 0 16px 0;
        font-size: 1.1rem;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .detection-item {
        background: rgba(255,255,255,0.05);
        border-radius: 8px;
        padding: 16px;
        margin-bottom: 12px;
      }
      .detection-item.no-detection {
        color: var(--muted);
        text-align: center;
        padding: 24px;
      }
      .detection-label {
        font-size: 0.85rem;
        color: var(--muted);
        margin-bottom: 4px;
      }
      .detection-value {
        font-size: 1.2rem;
        font-weight: 600;
        color: var(--text);
      }
      .detection-value.class-name {
        color: var(--blue);
        font-size: 1.4rem;
      }
      .confidence-bar {
        height: 8px;
        background: rgba(255,255,255,0.1);
        border-radius: 4px;
        margin-top: 8px;
        overflow: hidden;
      }
      .confidence-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--orange), var(--green));
        border-radius: 4px;
        transition: width 0.3s ease;
      }
      .preview-section {
        display: none;
        margin-top: 24px;
        padding: 20px;
        background: rgba(0,0,0,0.2);
        border-radius: 12px;
        border: 1px solid var(--border);
      }
      .preview-section.active {
        display: block;
      }
      .preview-section h3 {
        color: var(--slate);
        margin: 0 0 16px 0;
        font-size: 1.1rem;
      }
      .preview-section img {
        max-width: 100%;
        max-height: 300px;
        border-radius: 8px;
        border: 1px solid var(--border);
      }
      .alert {
        padding: 12px 16px;
        border-radius: 12px;
        border: 1px solid rgba(239,68,68,0.35);
        background: rgba(239,68,68,0.10);
        color: rgba(255,255,255,0.95);
        font-size: 13px;
        margin-bottom: 20px;
        display: none;
      }
      .processing-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(11, 16, 32, 0.9);
        z-index: 1000;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        gap: 20px;
      }
      .processing-overlay.active {
        display: flex;
      }
      .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid var(--border);
        border-top-color: var(--blue);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      .pulse {
        animation: pulse 1.5s ease-in-out infinite;
      }
      .back-link {
        display: inline-block;
        margin-top: 20px;
        color: var(--muted);
        text-decoration: none;
        font-size: 0.9rem;
        transition: color 0.2s;
      }
      .back-link:hover {
        color: var(--blue);
      }
      .live-indicator {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--red);
        font-size: 0.85rem;
        font-weight: 600;
      }
      .live-dot {
        width: 10px;
        height: 10px;
        background: var(--red);
        border-radius: 50%;
        animation: pulse 1s ease-in-out infinite;
      }
      #captureMode, #liveMode {
        display: none;
      }
      #captureMode.active, #liveMode.active {
        display: block;
      }
      .info-text {
        color: var(--muted);
        font-size: 0.9rem;
        margin-bottom: 16px;
      }
    </style>
  </head>
  <body>
    <div class="logo">
      <img src="https://static.wixstatic.com/media/f1a669_7810771f71194aaea024fdd8b6dd0f84~mv2.png/v1/fill/w_368,h_122,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/BusMate-logo.png" alt="Logo" />
    </div>
    
    <div class="container">
      <h2>🎥 Webcam Detection</h2>
      
      <!-- Mode Tabs -->
      <div class="mode-tabs">
        <div class="mode-tab active" id="liveTabBtn" onclick="switchMode('live')">
          🔴 Live Detection
        </div>
        <div class="mode-tab" id="captureTabBtn" onclick="switchMode('capture')">
          📸 Capture Mode
        </div>
      </div>
      
      <div id="errorAlert" class="alert"></div>
      
      <!-- Live Detection Mode -->
      <div id="liveMode" class="active">
        <div id="liveStatusBadge" class="status-badge loading">
          ⏳ Starting live detection...
        </div>
        
        <div class="webcam-wrapper">
          <div class="video-section">
            <div class="webcam-container">
              <img id="liveVideoFeed" src="{{ url_for('video_feed') }}" alt="Live Video Feed" />
            </div>
            <p class="info-text">
              <span class="live-indicator"><span class="live-dot"></span> LIVE</span> - 
              Real-time detection with bounding boxes and class names
            </p>
            <div class="controls">
              <button id="captureLiveBtn" class="capture-btn" onclick="captureFromLive()">
                📸 Capture Current Frame
              </button>
            </div>
          </div>
          
          <div class="detection-info-section">
            <div class="detection-panel">
              <h3>🎯 Detection Info</h3>
              <div id="detectionContent">
                <div class="detection-item no-detection">
                  <p>Point camera at a road sign to detect...</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Capture Mode -->
      <div id="captureMode">
        <div id="captureStatusBadge" class="status-badge loading">
          ⏳ Initializing webcam...
        </div>
        
        <div class="webcam-container">
          <video id="webcamVideo" autoplay playsinline></video>
          <canvas id="captureCanvas"></canvas>
        </div>
        
        <div class="controls">
          <button id="startBtn" onclick="startWebcam()" style="display: none;">
            🎥 Start Webcam
          </button>
          <button id="captureBtn" class="capture-btn" onclick="captureAndProcess()" disabled>
            📸 Capture & Process
          </button>
        </div>
        
        <div id="previewSection" class="preview-section">
          <h3>📷 Captured Image</h3>
          <img id="capturedImage" alt="Captured" />
        </div>
      </div>
      
      <a href="{{ url_for('index') }}" class="back-link">← Back to Home</a>
    </div>
    
    <div id="processingOverlay" class="processing-overlay">
      <div class="spinner"></div>
      <div style="color: var(--text); font-size: 1.1rem;">Processing image...</div>
    </div>
    
    <script>
      const video = document.getElementById('webcamVideo');
      const canvas = document.getElementById('captureCanvas');
      const captureBtn = document.getElementById('captureBtn');
      const startBtn = document.getElementById('startBtn');
      const captureStatusBadge = document.getElementById('captureStatusBadge');
      const liveStatusBadge = document.getElementById('liveStatusBadge');
      const errorAlert = document.getElementById('errorAlert');
      const previewSection = document.getElementById('previewSection');
      const capturedImage = document.getElementById('capturedImage');
      const processingOverlay = document.getElementById('processingOverlay');
      const liveVideoFeed = document.getElementById('liveVideoFeed');
      const detectionContent = document.getElementById('detectionContent');
      
      let stream = null;
      let currentMode = 'live';
      let detectionInterval = null;
      
      function switchMode(mode) {
        currentMode = mode;
        
        document.getElementById('liveMode').classList.toggle('active', mode === 'live');
        document.getElementById('captureMode').classList.toggle('active', mode === 'capture');
        document.getElementById('liveTabBtn').classList.toggle('active', mode === 'live');
        document.getElementById('captureTabBtn').classList.toggle('active', mode === 'capture');
        
        if (mode === 'capture') {
          // Stop live detection updates
          if (detectionInterval) {
            clearInterval(detectionInterval);
          }
          // Stop server camera
          fetch("{{ url_for('stop_camera') }}");
          // Start webcam for capture mode
          startWebcam();
        } else {
          // Stop capture webcam
          if (stream) {
            stream.getTracks().forEach(track => track.stop());
            stream = null;
          }
          // Start live detection
          startLiveDetection();
        }
      }
      
      function startLiveDetection() {
        liveStatusBadge.className = 'status-badge detecting';
        liveStatusBadge.innerHTML = '🟢 Live Detection Active';
        
        // Refresh video feed
        liveVideoFeed.src = "{{ url_for('video_feed') }}?" + new Date().getTime();
        
        // Poll for detection info
        if (detectionInterval) {
          clearInterval(detectionInterval);
        }
        
        detectionInterval = setInterval(updateDetectionInfo, 500);
      }
      
      async function updateDetectionInfo() {
        try {
          const response = await fetch("{{ url_for('get_detection_info') }}");
          const data = await response.json();
          
          if (data.class_name) {
            const confidencePercent = (data.confidence * 100).toFixed(1);
            let confidenceColor = 'var(--green)';
            if (data.confidence < 0.4) {
              confidenceColor = 'var(--red)';
            } else if (data.confidence < 0.75) {
              confidenceColor = 'var(--orange)';
            }
            
            detectionContent.innerHTML = `
              <div class="detection-item">
                <div class="detection-label">Detected Sign</div>
                <div class="detection-value class-name">${data.class_name}</div>
              </div>
              <div class="detection-item">
                <div class="detection-label">Confidence</div>
                <div class="detection-value" style="color: ${confidenceColor};">${confidencePercent}%</div>
                <div class="confidence-bar">
                  <div class="confidence-fill" style="width: ${confidencePercent}%; background: ${confidenceColor};"></div>
                </div>
              </div>
            `;
          } else {
            detectionContent.innerHTML = `
              <div class="detection-item no-detection">
                <p>Point camera at a road sign to detect...</p>
              </div>
            `;
          }
        } catch (err) {
          console.error('Error fetching detection info:', err);
        }
      }
      
      async function captureFromLive() {
        processingOverlay.classList.add('active');
        
        try {
          // Get frame by opening webcam briefly
          const tempStream = await navigator.mediaDevices.getUserMedia({ 
            video: { width: { ideal: 1280 }, height: { ideal: 720 } }
          });
          
          const tempVideo = document.createElement('video');
          tempVideo.srcObject = tempStream;
          await tempVideo.play();
          
          // Wait a moment for video to stabilize
          await new Promise(resolve => setTimeout(resolve, 300));
          
          const tempCanvas = document.createElement('canvas');
          tempCanvas.width = tempVideo.videoWidth;
          tempCanvas.height = tempVideo.videoHeight;
          const ctx = tempCanvas.getContext('2d');
          ctx.drawImage(tempVideo, 0, 0);
          
          // Stop temporary stream
          tempStream.getTracks().forEach(track => track.stop());
          
          const imageData = tempCanvas.toDataURL('image/jpeg', 0.95);
          
          // Send to server for processing
          const processResponse = await fetch("{{ url_for('process_webcam_frame') }}", {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ image: imageData })
          });
          
          const result = await processResponse.json();
          
          if (result.detected) {
            // Redirect to results page
            window.location.href = "{{ url_for('results_from_webcam') }}?" + new URLSearchParams({
              original: result.original,
              detected: result.detected_image,
              crop: result.crop,
              class_name: result.class_name,
              confidence: result.confidence
            });
          } else {
            processingOverlay.classList.remove('active');
            errorAlert.textContent = result.message || 'No road sign detected in the frame.';
            errorAlert.style.display = 'block';
            setTimeout(() => { errorAlert.style.display = 'none'; }, 3000);
          }
          
        } catch (err) {
          console.error('Error capturing:', err);
          processingOverlay.classList.remove('active');
          errorAlert.textContent = 'Error capturing frame. Please try again.';
          errorAlert.style.display = 'block';
        }
      }
      
      async function startWebcam() {
        try {
          stream = await navigator.mediaDevices.getUserMedia({ 
            video: { 
              width: { ideal: 1280 },
              height: { ideal: 720 }
            } 
          });
          video.srcObject = stream;
          captureBtn.disabled = false;
          startBtn.style.display = 'none';
          captureStatusBadge.className = 'status-badge ready';
          captureStatusBadge.innerHTML = '🟢 Webcam Ready';
          errorAlert.style.display = 'none';
        } catch (err) {
          console.error('Error accessing webcam:', err);
          captureStatusBadge.className = 'status-badge error';
          captureStatusBadge.innerHTML = '❌ Webcam Access Failed';
          startBtn.style.display = 'inline-flex';
          errorAlert.textContent = 'Could not access webcam. Please make sure you have granted camera permissions.';
          errorAlert.style.display = 'block';
        }
      }
      
      async function captureAndProcess() {
        if (!stream) return;
        
        // Capture frame
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0);
        
        // Get image data
        const imageData = canvas.toDataURL('image/jpeg', 0.95);
        
        // Show preview
        capturedImage.src = imageData;
        previewSection.classList.add('active');
        
        // Show processing overlay
        processingOverlay.classList.add('active');
        
        try {
          // Convert to blob and upload
          const blob = await fetch(imageData).then(r => r.blob());
          const formData = new FormData();
          formData.append('file', blob, 'webcam_capture.jpg');
          formData.append('input_type', 'image');
          
          const response = await fetch('{{ url_for("upload") }}', {
            method: 'POST',
            body: formData
          });
          
          if (response.redirected) {
            window.location.href = response.url;
          } else {
            const html = await response.text();
            document.open();
            document.write(html);
            document.close();
          }
        } catch (err) {
          console.error('Error processing:', err);
          processingOverlay.classList.remove('active');
          errorAlert.textContent = 'Error processing image. Please try again.';
          errorAlert.style.display = 'block';
        }
      }
      
      // Start live detection by default
      startLiveDetection();
      
      // Handle live video feed errors
      liveVideoFeed.onerror = function() {
        liveStatusBadge.className = 'status-badge error';
        liveStatusBadge.innerHTML = '❌ Camera Not Available';
        errorAlert.textContent = 'Could not start live video feed. The camera may be in use by another application.';
        errorAlert.style.display = 'block';
      };
      
      liveVideoFeed.onload = function() {
        liveStatusBadge.className = 'status-badge detecting';
        liveStatusBadge.innerHTML = '🟢 Live Detection Active';
      };
      
      // Cleanup on page unload
      window.addEventListener('beforeunload', () => {
        if (stream) {
          stream.getTracks().forEach(track => track.stop());
        }
        if (detectionInterval) {
          clearInterval(detectionInterval);
        }
        // Stop server camera
        fetch("{{ url_for('stop_camera') }}");
      });
    </script>
  </body>
</html>
