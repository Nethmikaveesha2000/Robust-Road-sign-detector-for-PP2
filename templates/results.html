<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Results - Robust Road Sign Detection</title>
    <style>
      :root {
        --bg: #0b1020;
        --text: rgba(255,255,255,0.92);
        --muted: rgba(255,255,255,0.65);
        --border: rgba(255,255,255,0.10);
        --red: #ff4d4f;
        --orange: #ffa940;
        --green: #2ecc71;
        --blue: #4da3ff;
        --purple: #b37feb;
        --slate: rgba(255,255,255,0.85);
      }
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        margin: 0;
        min-height: 100vh;
        padding-bottom: 40px;
      }
      .logo {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: 32px;
        margin-bottom: 12px;
      }
      .logo img {
        height: 80px;
        width: auto;
      }
      .container {
        max-width: 1100px;
        margin: 20px auto 60px auto;
        background: rgba(255,255,255,0.04);
        box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        border-radius: 16px;
        padding: 32px 28px 24px 28px;
        border: 1px solid var(--border);
        backdrop-filter: blur(10px);
      }
      h2 {
        color: var(--slate);
        margin-bottom: 24px;
        font-size: 2rem;
        font-weight: 600;
        text-align: center;
      }
      .results-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
        margin-bottom: 24px;
      }
      @media (max-width: 768px) {
        .results-grid {
          grid-template-columns: 1fr;
        }
      }
      .result-card {
        background: rgba(0,0,0,0.2);
        border-radius: 12px;
        padding: 20px;
        border: 1px solid var(--border);
      }
      .result-card h3 {
        color: var(--slate);
        margin: 0 0 16px 0;
        font-size: 1.1rem;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .result-card img {
        width: 100%;
        border-radius: 8px;
        border: 1px solid var(--border);
      }
      .detection-info {
        background: rgba(0,0,0,0.3);
        border-radius: 12px;
        padding: 24px;
        border: 1px solid var(--border);
        margin-top: 24px;
      }
      .detection-info h3 {
        color: var(--slate);
        margin: 0 0 20px 0;
        font-size: 1.3rem;
        font-weight: 600;
        text-align: center;
      }
      .info-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 16px;
      }
      .info-item {
        background: rgba(255,255,255,0.05);
        padding: 16px;
        border-radius: 10px;
        text-align: center;
        border: 1px solid var(--border);
      }
      .info-item .label {
        color: var(--muted);
        font-size: 0.85rem;
        margin-bottom: 8px;
      }
      .info-item .value {
        font-size: 1.3rem;
        font-weight: 600;
      }
      .info-item .value.class-name {
        color: var(--green);
      }
      .info-item .value.confidence {
        color: var(--blue);
      }
      .cropped-section {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .cropped-image {
        max-width: 250px;
        max-height: 250px;
        object-fit: contain;
      }
      .button-group {
        display: flex;
        justify-content: center;
        gap: 16px;
        margin-top: 32px;
        flex-wrap: wrap;
      }
      button, a.button {
        background: var(--blue);
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 12px 24px;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s;
        box-shadow: 0 2px 8px rgba(0,0,0,0.07);
        text-decoration: none;
        display: inline-block;
      }
      button:hover, a.button:hover {
        background: var(--orange);
      }
      a.button.secondary {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text);
      }
      a.button.secondary:hover {
        background: rgba(255,255,255,0.1);
      }
      .success-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
        background: rgba(46, 204, 113, 0.15);
        border: 1px solid rgba(46, 204, 113, 0.3);
        border-radius: 20px;
        color: var(--green);
        font-size: 0.9rem;
        margin-bottom: 24px;
      }
    </style>
  </head>
  <body>
    <div class="logo">
      <img src="https://static.wixstatic.com/media/f1a669_7810771f71194aaea024fdd8b6dd0f84~mv2.png/v1/fill/w_368,h_122,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/BusMate-logo.png" alt="Logo" />
    </div>
    
    <div class="container">
      <h2>Detection Results</h2>
      
      <div style="text-align: center;">
        <div class="success-badge">
          ✅ Road Sign Detected Successfully
        </div>
      </div>
      
      <div class="results-grid">
        <div class="result-card">
          <h3>📷 Original Image</h3>
          <img src="{{ url_for('static', filename=original_image.replace('static/', '')) }}" alt="Original Image" />
        </div>
        
        <div class="result-card">
          <h3>🎯 Detection with Bounding Box</h3>
          <img src="{{ url_for('static', filename=detected_image.replace('static/', '')) }}" alt="Detected Image" />
        </div>
      </div>
      
      <div class="detection-info">
        <h3>🔍 Classification Result</h3>
        <div class="info-grid">
          <div class="info-item cropped-section">
            <div class="label">Cropped Sign</div>
            <img src="{{ url_for('static', filename=crop_image.replace('static/', '')) }}" alt="Cropped Sign" class="cropped-image" />
          </div>
          <div class="info-item">
            <div class="label">Detected Class</div>
            <div class="value class-name">{{ class_name }}</div>
          </div>
          <div class="info-item">
            <div class="label">Confidence Score</div>
            <div class="value confidence">{{ confidence }}</div>
          </div>
        </div>
      </div>
      
      <div class="button-group">
        <a href="{{ url_for('upload') }}?input_type=image" class="button">📸 Analyze Another Image</a>
        <a href="{{ url_for('index') }}" class="button secondary">← Back to Home</a>
      </div>
    </div>
  </body>
</html>
